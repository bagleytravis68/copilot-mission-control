name: Policy Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review
  push:
    branches:
      - main
      - master
      - bagleytravis68-import-custom-agents

jobs:
  policy-checks:
    name: Version, changelog, and branch policy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run version consistency check
        shell: pwsh
        run: .\scripts\version.ps1 -Command check

      - name: Verify pull request branch name
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          ALLOWED_PATTERN='^(feat|fix|docs|chore|refactor|test)/([0-9]+-)?[a-z0-9]+(-[a-z0-9]+)*$'

          if [[ "$BRANCH_NAME" =~ ^feature/ ]]; then
            echo "::error::PR source branch '$BRANCH_NAME' uses the forbidden 'feature/' prefix. Use one of feat/, fix/, docs/, chore/, refactor/, or test/."
            exit 1
          fi

          if [[ ! "$BRANCH_NAME" =~ $ALLOWED_PATTERN ]]; then
            echo "::error::PR source branch '$BRANCH_NAME' must use intent-first kebab-case with one of feat/, fix/, docs/, chore/, refactor/, or test/. Optional issue-number forms such as feat/123-add-rubber-duck-agent are allowed."
            exit 1
          fi

      - name: Verify CHANGELOG.md changed in this PR
        if: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'no-changelog') }}
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_FILES="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          echo "$CHANGED_FILES"

          if ! grep -Fxq "CHANGELOG.md" <<< "$CHANGED_FILES"; then
            echo "::error::CHANGELOG.md must be updated under the Unreleased section in this PR unless the PR is labeled 'no-changelog'."
            exit 1
          fi
